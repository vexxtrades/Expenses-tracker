<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Fintrack</title>
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
:root{
  --bg:#0D0F18;--card:#161923;--card2:#1E2235;--accent:#7B6EF6;--a2:rgba(123,110,246,0.18);
  --green:#34D399;--g2:rgba(52,211,153,0.14);--red:#F87171;--r2:rgba(248,113,113,0.14);
  --amber:#FBBF24;--text:#F0F1F7;--sub:#8B8FA8;--bdr:rgba(255,255,255,0.07);
  --safe-b:env(safe-area-inset-bottom,0px);
}
html,body{height:100%;background:var(--bg);color:var(--text);font-family:-apple-system,'SF Pro Display','Inter',sans-serif;font-size:16px;-webkit-font-smoothing:antialiased;overscroll-behavior:none}
.app{display:flex;flex-direction:column;height:100dvh;max-width:430px;margin:0 auto;position:relative;overflow:hidden;background:var(--bg)}
.screen{display:none;flex-direction:column;flex:1;overflow-y:auto;overflow-x:hidden;padding-bottom:calc(76px + var(--safe-b));scrollbar-width:none;-webkit-overflow-scrolling:touch}
.screen::-webkit-scrollbar{display:none}
.screen.active{display:flex}
.screen-header{padding:52px 20px 14px;display:flex;align-items:flex-end;justify-content:space-between}
.screen-title{font-size:28px;font-weight:700;letter-spacing:-0.8px}
/* TAB BAR */
.tab-bar{position:absolute;bottom:0;left:0;right:0;height:calc(58px + var(--safe-b));padding-bottom:var(--safe-b);background:rgba(13,15,24,0.96);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);border-top:1px solid var(--bdr);display:flex;align-items:flex-start;padding-top:10px;z-index:50}
.tab{flex:1;display:flex;flex-direction:column;align-items:center;gap:4px;cursor:pointer;padding:2px 0}
.tab svg{transition:transform 0.2s cubic-bezier(0.34,1.56,0.64,1)}
.tab.active svg{transform:scale(1.12)}
.tab-label{font-size:10px;font-weight:600;letter-spacing:0.02em;color:var(--sub);transition:color 0.15s}
.tab.active .tab-label{color:var(--accent)}
/* HERO */
.hero-card{margin:0 16px 20px;background:linear-gradient(135deg,#2D2462 0%,#1A1638 60%,#0D0F18 100%);border:1px solid rgba(123,110,246,0.22);border-radius:24px;padding:26px 22px 22px;position:relative;overflow:hidden}
.hero-card::before{content:'';position:absolute;top:-40px;right:-40px;width:150px;height:150px;background:radial-gradient(circle,rgba(123,110,246,0.28) 0%,transparent 70%);border-radius:50%;pointer-events:none}
.hero-label{font-size:11.5px;font-weight:600;letter-spacing:0.1em;text-transform:uppercase;color:rgba(255,255,255,0.45);margin-bottom:6px}
.hero-amount{font-size:40px;font-weight:700;letter-spacing:-2px;line-height:1;margin-bottom:18px}
.hero-row{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.hero-stat{background:rgba(255,255,255,0.07);border-radius:12px;padding:11px 13px}
.hero-stat-label{font-size:11px;color:rgba(255,255,255,0.45);font-weight:500;margin-bottom:3px}
.hero-stat-val{font-size:17px;font-weight:700;letter-spacing:-0.4px}
/* SECTION */
.section{margin:0 16px 22px}
.section-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px}
.section-title{font-size:17px;font-weight:700;letter-spacing:-0.3px}
/* MONTHS */
.month-scroll{display:flex;gap:8px;overflow-x:auto;scrollbar-width:none;padding:0 16px;margin-bottom:18px;-webkit-overflow-scrolling:touch}
.month-scroll::-webkit-scrollbar{display:none}
.month-chip{flex-shrink:0;padding:7px 15px;border-radius:20px;font-size:13px;font-weight:600;border:1.5px solid var(--bdr);color:var(--sub);cursor:pointer;background:none;white-space:nowrap;transition:all 0.15s}
.month-chip.active{background:var(--accent);border-color:var(--accent);color:#fff}
/* DONUT */
.donut-wrap{display:flex;align-items:center;justify-content:center;margin-bottom:18px}
/* CAT LIST */
.cat-list{display:flex;flex-direction:column;gap:9px}
.cat-item{background:var(--card);border-radius:14px;padding:13px 15px;display:flex;align-items:center;gap:12px}
.cat-icon-wrap{width:38px;height:38px;border-radius:11px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.cat-info{flex:1;min-width:0}
.cat-name{font-size:14px;font-weight:600;margin-bottom:6px}
.cat-bar-bg{height:3px;background:var(--bdr);border-radius:2px;overflow:hidden}
.cat-bar{height:100%;border-radius:2px;transition:width 0.6s ease}
.cat-amount{font-size:14px;font-weight:700;letter-spacing:-0.3px;flex-shrink:0}
.cat-pct{font-size:11px;color:var(--sub);text-align:right;margin-top:2px}
/* SEARCH */
.search-wrap{position:relative;margin:0 16px 14px}
.search-wrap svg{position:absolute;left:12px;top:50%;transform:translateY(-50%);pointer-events:none}
.search-wrap input{width:100%;background:var(--card);border:1px solid var(--bdr);border-radius:12px;padding:11px 14px 11px 38px;color:var(--text);font-size:15px;outline:none}
.search-wrap input::placeholder{color:var(--sub)}
.search-wrap input:focus{border-color:var(--accent)}
/* TX */
.tx-group-label{font-size:12px;font-weight:700;letter-spacing:0.06em;text-transform:uppercase;color:var(--sub);padding:0 20px;margin-bottom:8px;margin-top:4px}
.tx-list{margin:0 16px;display:flex;flex-direction:column;gap:8px;margin-bottom:14px}
.tx-item{background:var(--card);border-radius:14px;padding:12px 14px;display:flex;align-items:center;gap:11px}
.tx-icon-wrap{width:40px;height:40px;border-radius:12px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.tx-info{flex:1;min-width:0}
.tx-name{font-size:14px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.tx-cat{font-size:12px;color:var(--sub);margin-top:2px}
.tx-right{text-align:right;flex-shrink:0}
.tx-amt{font-size:14px;font-weight:700;letter-spacing:-0.3px}
.tx-date{font-size:11px;color:var(--sub);margin-top:2px}
.tx-income{color:var(--green)}
.tx-expense{color:var(--red)}
/* BUDGET */
.budget-item{background:var(--card);border-radius:16px;padding:15px;margin-bottom:10px}
.budget-top{display:flex;justify-content:space-between;align-items:center;margin-bottom:11px}
.budget-left{display:flex;align-items:center;gap:10px}
.budget-icon{width:36px;height:36px;border-radius:10px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.budget-name{font-size:15px;font-weight:600}
.budget-vals{font-size:13px;color:var(--sub);text-align:right}
.budget-track{height:5px;background:var(--card2);border-radius:3px;overflow:hidden}
.budget-fill{height:100%;border-radius:3px;transition:width 0.7s ease}
/* CAT SCREEN */
.cat-screen-list{display:flex;flex-direction:column;gap:0;margin:0 16px}
.cat-row{background:var(--card);display:flex;align-items:center;gap:12px;padding:13px 14px;cursor:pointer;transition:background 0.12s}
.cat-row:first-child{border-radius:14px 14px 0 0}
.cat-row:last-child{border-radius:0 0 14px 14px}
.cat-row:only-child{border-radius:14px}
.cat-row+.cat-row{border-top:1px solid var(--bdr)}
.cat-row:active{background:var(--card2)}
.cat-row-icon{width:36px;height:36px;border-radius:10px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.cat-row-name{flex:1;font-size:15px;font-weight:500}
.add-cat-btn{margin:14px 16px 0;background:var(--card);border:1.5px dashed rgba(123,110,246,0.4);border-radius:14px;padding:14px;width:calc(100% - 32px);color:var(--accent);font-size:15px;font-weight:600;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:8px;transition:all 0.15s}
.add-cat-btn:active{background:var(--a2)}
/* FAB */
.fab{position:absolute;bottom:calc(70px + var(--safe-b));right:18px;width:52px;height:52px;border-radius:50%;background:var(--accent);border:none;color:#fff;cursor:pointer;display:flex;align-items:center;justify-content:center;box-shadow:0 4px 18px rgba(123,110,246,0.5);z-index:40;transition:transform 0.2s cubic-bezier(0.34,1.56,0.64,1)}
.fab:active{transform:scale(0.9)}
/* SHEET */
.sheet-bg{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.6);z-index:100;backdrop-filter:blur(6px);-webkit-backdrop-filter:blur(6px);align-items:flex-end}
.sheet-bg.open{display:flex}
.sheet{background:var(--card);border-radius:24px 24px 0 0;width:100%;max-width:430px;margin:0 auto;padding:12px 20px calc(24px + var(--safe-b));animation:slideUp 0.28s cubic-bezier(0.32,0.72,0,1);max-height:90dvh;overflow-y:auto}
.sheet::-webkit-scrollbar{display:none}
@keyframes slideUp{from{transform:translateY(100%)}to{transform:translateY(0)}}
.sheet-handle{width:36px;height:4px;background:rgba(255,255,255,0.18);border-radius:2px;margin:0 auto 18px}
.sheet-title{font-size:18px;font-weight:700;letter-spacing:-0.4px;margin-bottom:18px}
.field-group{margin-bottom:13px}
.field-label{font-size:11.5px;font-weight:600;letter-spacing:0.05em;text-transform:uppercase;color:var(--sub);display:block;margin-bottom:6px}
.field-input,.field-select{width:100%;background:var(--card2);border:1.5px solid var(--bdr);border-radius:12px;padding:12px 13px;color:var(--text);font-size:16px;outline:none;transition:border-color 0.15s;-webkit-appearance:none}
.field-input:focus,.field-select:focus{border-color:var(--accent)}
.field-input::placeholder{color:var(--sub)}
.field-row{display:grid;grid-template-columns:1fr 1fr;gap:11px}
.type-toggle{display:grid;grid-template-columns:1fr 1fr;background:var(--card2);border-radius:12px;padding:4px;gap:4px}
.type-btn{padding:10px;border-radius:9px;border:none;font-size:14px;font-weight:600;cursor:pointer;background:transparent;color:var(--sub);transition:all 0.15s}
.type-btn.ae{background:var(--r2);color:var(--red)}
.type-btn.ai{background:var(--g2);color:var(--green)}
.btn-save{width:100%;margin-top:8px;padding:14px;background:var(--accent);color:#fff;border:none;border-radius:14px;font-size:16px;font-weight:700;cursor:pointer;transition:opacity 0.15s}
.btn-save:active{opacity:0.85}
.btn-del{width:100%;margin-top:8px;padding:13px;background:var(--r2);color:var(--red);border:none;border-radius:14px;font-size:15px;font-weight:600;cursor:pointer}
/* COLOR */
.color-grid{display:grid;grid-template-columns:repeat(8,1fr);gap:8px;margin-top:4px}
.cswatch{width:100%;aspect-ratio:1;border-radius:50%;cursor:pointer;border:2px solid transparent;transition:transform 0.15s,border-color 0.15s}
.cswatch.sel{border-color:#fff;transform:scale(1.18)}
/* ICON GRID */
.icon-grid{display:grid;grid-template-columns:repeat(6,1fr);gap:8px;margin-top:4px}
.iswatch{width:100%;aspect-ratio:1;border-radius:10px;display:flex;align-items:center;justify-content:center;cursor:pointer;border:1.5px solid transparent;transition:all 0.15s}
/* EMPTY */
.empty{text-align:center;padding:48px 24px;color:var(--sub)}
.empty-text{font-size:14px;line-height:1.5;margin-top:10px}
/* TOAST */
.toast{position:fixed;bottom:calc(90px + var(--safe-b));left:50%;transform:translateX(-50%) translateY(20px);background:#1E2235;border:1px solid var(--bdr);border-radius:12px;padding:10px 18px;font-size:13px;font-weight:600;color:var(--text);z-index:200;opacity:0;transition:all 0.25s;pointer-events:none;white-space:nowrap}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
/* SECTION LABEL */
.sec-label{font-size:11.5px;font-weight:700;letter-spacing:0.06em;text-transform:uppercase;color:var(--sub);padding:0 20px;margin-bottom:8px}
</style>
</head>
<body>
<div class="app">

<!-- OVERVIEW -->
<div class="screen active" id="screen-overview">
  <div class="screen-header">
    <div>
      <div style="font-size:13px;color:var(--sub);font-weight:500;margin-bottom:2px">Good evening, Francisco</div>
      <div class="screen-title">Overview</div>
    </div>
    <div style="width:34px;height:34px;border-radius:50%;background:linear-gradient(135deg,var(--accent),#A78BFA);display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:700">F</div>
  </div>
  <div class="month-scroll" id="monthScroll"></div>
  <div class="hero-card">
    <div class="hero-label">Net Savings</div>
    <div class="hero-amount" id="heroNet">$0</div>
    <div class="hero-row">
      <div class="hero-stat"><div class="hero-stat-label">Income</div><div class="hero-stat-val" id="heroIncome" style="color:var(--green)">$0</div></div>
      <div class="hero-stat"><div class="hero-stat-label">Expenses</div><div class="hero-stat-val" id="heroExp" style="color:var(--red)">$0</div></div>
    </div>
  </div>
  <div class="section">
    <div class="section-header"><div class="section-title">Spending</div></div>
    <div class="donut-wrap"><svg width="178" height="178" viewBox="0 0 160 160" id="donutSvg"></svg></div>
    <div class="cat-list" id="catList"></div>
  </div>
</div>

<!-- ACTIVITY -->
<div class="screen" id="screen-transactions">
  <div class="screen-header"><div class="screen-title">Activity</div></div>
  <div class="search-wrap">
    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="var(--sub)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
    <input type="text" id="txSearch" placeholder="Search transactions…" oninput="renderTx()">
  </div>
  <div id="txContainer"></div>
</div>

<!-- BUDGETS -->
<div class="screen" id="screen-budgets">
  <div class="screen-header"><div class="screen-title">Budgets</div></div>
  <div class="section" id="budgetList"></div>
</div>

<!-- CATEGORIES -->
<div class="screen" id="screen-categories">
  <div class="screen-header"><div class="screen-title">Categories</div></div>
  <div id="catScreenList"></div>
  <button class="add-cat-btn" onclick="openCatSheet(null)">
    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
    New Category
  </button>
</div>

<!-- FAB -->
<button class="fab" onclick="openSheet()">
  <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2.5" stroke-linecap="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
</button>

<!-- TAB BAR -->
<nav class="tab-bar">
  <div class="tab active" id="tab-overview" onclick="switchTab('overview')">
    <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="var(--accent)" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="7" height="7" rx="1.5"/><rect x="14" y="3" width="7" height="7" rx="1.5"/><rect x="3" y="14" width="7" height="7" rx="1.5"/><rect x="14" y="14" width="7" height="7" rx="1.5"/></svg>
    <div class="tab-label">Overview</div>
  </div>
  <div class="tab" id="tab-transactions" onclick="switchTab('transactions')">
    <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="var(--sub)" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><line x1="8" y1="6" x2="21" y2="6"/><line x1="8" y1="12" x2="21" y2="12"/><line x1="8" y1="18" x2="21" y2="18"/><circle cx="3.5" cy="6" r="0.5" fill="var(--sub)"/><circle cx="3.5" cy="12" r="0.5" fill="var(--sub)"/><circle cx="3.5" cy="18" r="0.5" fill="var(--sub)"/></svg>
    <div class="tab-label">Activity</div>
  </div>
  <div class="tab" id="tab-budgets" onclick="switchTab('budgets')">
    <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="var(--sub)" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M12 2a10 10 0 1 0 10 10"/><path d="M12 6v6l4 2"/><path d="M18 2v4h4"/></svg>
    <div class="tab-label">Budgets</div>
  </div>
  <div class="tab" id="tab-categories" onclick="switchTab('categories')">
    <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="var(--sub)" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M3 3h7v7H3z"/><path d="M14 3h7v7h-7z"/><path d="M3 14h7v7H3z"/><line x1="14" y1="17.5" x2="21" y2="17.5"/><line x1="17.5" y1="14" x2="17.5" y2="21"/></svg>
    <div class="tab-label">Categories</div>
  </div>
</nav>
</div>

<!-- ADD TRANSACTION SHEET -->
<div class="sheet-bg" id="sheetBg">
  <div class="sheet">
    <div class="sheet-handle"></div>
    <div class="sheet-title">New Transaction</div>
    <div class="field-group">
      <div class="type-toggle">
        <button class="type-btn ae" id="btnExpense" onclick="setType('expense')">Expense</button>
        <button class="type-btn" id="btnIncome" onclick="setType('income')">Income</button>
      </div>
    </div>
    <div class="field-group"><label class="field-label">Amount</label><input class="field-input" type="number" id="fAmt" placeholder="$0.00" inputmode="decimal" min="0" step="0.01"></div>
    <div class="field-group"><label class="field-label">Description</label><input class="field-input" type="text" id="fMerch" placeholder="e.g. Whole Foods"></div>
    <div class="field-row">
      <div class="field-group"><label class="field-label">Category</label><select class="field-select" id="fCat"></select></div>
      <div class="field-group"><label class="field-label">Date</label><input class="field-input" type="date" id="fDate"></div>
    </div>
    <button class="btn-save" onclick="saveTransaction()">Save Transaction</button>
  </div>
</div>

<!-- CATEGORY SHEET -->
<div class="sheet-bg" id="catSheetBg">
  <div class="sheet">
    <div class="sheet-handle"></div>
    <div class="sheet-title" id="catSheetTitle">New Category</div>
    <div class="field-group"><label class="field-label">Name</label><input class="field-input" type="text" id="cName" placeholder="e.g. Fitness"></div>
    <div class="field-group">
      <label class="field-label">Type</label>
      <div class="type-toggle">
        <button class="type-btn ae" id="cBtnExp" onclick="setCatType('expense')">Expense</button>
        <button class="type-btn" id="cBtnInc" onclick="setCatType('income')">Income</button>
      </div>
    </div>
    <div class="field-group"><label class="field-label">Color</label><div class="color-grid" id="colorGrid"></div></div>
    <div class="field-group"><label class="field-label">Icon</label><div class="icon-grid" id="iconGrid"></div></div>
    <button class="btn-save" onclick="saveCat()">Save Category</button>
    <button class="btn-del" id="catDelBtn" onclick="deleteCat()" style="display:none">Delete Category</button>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
// ICONS — minimal SVG path strings
const ICONS={
  fork:`<path d="M8 3v4a4 4 0 0 0 8 0V3M12 11v10"/>`,
  cart:`<circle cx="9" cy="20" r="1.2" fill="c"/><circle cx="18" cy="20" r="1.2" fill="c"/><path d="M3 3h2l.4 2M7 13h10l2-7H5.4"/>`,
  car:`<rect x="1" y="9" width="22" height="9" rx="3"/><path d="M6 9l2-5h8l2 5"/><circle cx="7" cy="18" r="2" fill="c"/><circle cx="17" cy="18" r="2" fill="c"/>`,
  home:`<path d="M3 12L12 3l9 9"/><path d="M9 21V12h6v9"/><path d="M3 12v9h18v-9"/>`,
  play:`<rect x="2" y="3" width="20" height="14" rx="2"/><path d="M8 7l5 3.5L8 14z" fill="c" stroke="none"/>`,
  heart:`<path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78L12 21.23l8.84-8.84a5.5 5.5 0 0 0 0-7.78z"/>`,
  bag:`<path d="M6 2L3 6v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2V6l-3-4z"/><line x1="3" y1="6" x2="21" y2="6"/><path d="M16 10a4 4 0 0 1-8 0"/>`,
  zap:`<polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"/>`,
  dollar:`<line x1="12" y1="1" x2="12" y2="23"/><path d="M17 5H9.5a3.5 3.5 0 1 0 0 7h5a3.5 3.5 0 1 1 0 7H6"/>`,
  coffee:`<path d="M17 8h1a4 4 0 0 1 0 8h-1"/><path d="M3 8h14v9a4 4 0 0 1-4 4H7a4 4 0 0 1-4-4z"/><line x1="6" y1="2" x2="6" y2="5"/><line x1="10" y1="2" x2="10" y2="5"/><line x1="14" y1="2" x2="14" y2="5"/>`,
  gift:`<polyline points="20 12 20 22 4 22 4 12"/><rect x="2" y="7" width="20" height="5" rx="1"/><line x1="12" y1="22" x2="12" y2="7"/><path d="M12 7H7.5a2.5 2.5 0 0 1 0-5C11 2 12 7 12 7z"/><path d="M12 7h4.5a2.5 2.5 0 0 0 0-5C13 2 12 7 12 7z"/>`,
  music:`<path d="M9 18V5l12-2v13"/><circle cx="6" cy="18" r="3"/><circle cx="18" cy="16" r="3"/>`,
  star:`<polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/>`,
  book:`<path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"/><path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"/>`,
  plane:`<path d="M21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 2 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16z"/>`,
  box:`<path d="M21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 2 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16z"/><polyline points="3.27 6.96 12 12.01 20.73 6.96"/><line x1="12" y1="22.08" x2="12" y2="12"/>`,
  phone:`<rect x="5" y="2" width="14" height="20" rx="2"/><line x1="12" y1="18" x2="12.01" y2="18"/>`,
  tag:`<path d="M20.59 13.41l-7.17 7.17a2 2 0 0 1-2.83 0L2 12V2h10l8.59 8.59a2 2 0 0 1 0 2.82z"/><line x1="7" y1="7" x2="7.01" y2="7"/>`,
  leaf:`<path d="M2 22c1-1 2-2 3-3 2-2 4-2 6 0 2 2 4 4 7 3C20 21 22 18 22 12 22 6 18 2 12 2 6 2 2 6 2 12c0 2 0 4 1 6"/>`,
};

function iconSvg(k,color,size){
  size=size||18;
  const d=(ICONS[k]||ICONS.box).replace(/fill="c"/g,`fill="${color}" stroke="none"`);
  return `<svg width="${size}" height="${size}" viewBox="0 0 24 24" fill="none" stroke="${color}" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">${d}</svg>`;
}

const PALETTE=['#7B6EF6','#34D399','#F87171','#FBBF24','#60A5FA','#F472B6','#22D3EE','#FB923C','#A78BFA','#4ADE80','#E879F9','#FCA5A5','#6EE7B7','#93C5FD','#FCD34D','#818CF8'];

// DATA
let cats=JSON.parse(localStorage.getItem('ft3_cats')||'null');
if(!cats){cats=[
  {id:'food',name:'Food & Drink',color:'#7B6EF6',icon:'fork',type:'expense'},
  {id:'gro', name:'Groceries',  color:'#34D399',icon:'cart',type:'expense'},
  {id:'trn', name:'Transport',  color:'#FBBF24',icon:'car', type:'expense'},
  {id:'hom', name:'Housing',    color:'#60A5FA',icon:'home',type:'expense'},
  {id:'ent', name:'Entertainment',color:'#F472B6',icon:'play',type:'expense'},
  {id:'hlth',name:'Health',     color:'#22D3EE',icon:'heart',type:'expense'},
  {id:'shp', name:'Shopping',   color:'#A78BFA',icon:'bag', type:'expense'},
  {id:'utl', name:'Utilities',  color:'#FB923C',icon:'zap', type:'expense'},
  {id:'inc', name:'Income',     color:'#34D399',icon:'dollar',type:'income'},
  {id:'oth', name:'Other',      color:'#6B7280',icon:'box', type:'expense'},
];saveCatsF();}

let txs=JSON.parse(localStorage.getItem('ft3_txs')||'null');
if(!txs){txs=[
  {id:1, type:'income', merchant:'Paycheck',    catId:'inc',  amount:3800,  date:'2026-06-01'},
  {id:2, type:'expense',merchant:'Rent',         catId:'hom',  amount:1400,  date:'2026-06-01'},
  {id:3, type:'expense',merchant:'Whole Foods',  catId:'gro',  amount:87.40, date:'2026-06-02'},
  {id:4, type:'expense',merchant:'Netflix',      catId:'ent',  amount:15.99, date:'2026-06-03'},
  {id:5, type:'expense',merchant:'Shell Gas',    catId:'trn',  amount:52.10, date:'2026-06-04'},
  {id:6, type:'expense',merchant:'Chipotle',     catId:'food', amount:14.75, date:'2026-06-05'},
  {id:7, type:'expense',merchant:'CVS Pharmacy', catId:'hlth', amount:23.50, date:'2026-06-06'},
  {id:8, type:'expense',merchant:'Amazon',       catId:'shp',  amount:67.99, date:'2026-06-07'},
  {id:9, type:'expense',merchant:'SoCal Edison', catId:'utl',  amount:88.00, date:'2026-06-08'},
  {id:10,type:'expense',merchant:'Starbucks',    catId:'food', amount:6.75,  date:'2026-06-09'},
  {id:11,type:'income', merchant:'Freelance',    catId:'inc',  amount:450,   date:'2026-06-10'},
  {id:12,type:'expense',merchant:"Trader Joe's", catId:'gro',  amount:61.20, date:'2026-06-11'},
  {id:13,type:'expense',merchant:'Uber',         catId:'trn',  amount:18.40, date:'2026-06-12'},
  {id:14,type:'expense',merchant:'Spotify',      catId:'ent',  amount:9.99,  date:'2026-06-13'},
];saveTxsF();}

function saveCatsF(){localStorage.setItem('ft3_cats',JSON.stringify(cats));}
function saveTxsF(){localStorage.setItem('ft3_txs',JSON.stringify(txs));}
function getCat(id){return cats.find(c=>c.id===id)||cats.find(c=>c.id==='oth')||{name:'Other',color:'#6B7280',icon:'box'};}
function uid(){return Math.random().toString(36).slice(2,8);}

// MONTHS
const MONTHS=['2026-06','2026-05','2026-04'];
const ML={'2026-06':'Jun 2026','2026-05':'May 2026','2026-04':'Apr 2026'};
let curMonth='2026-06';
function filtered(){return txs.filter(t=>t.date.startsWith(curMonth));}
function fmt(n){return '$'+Math.abs(n).toLocaleString('en-US',{minimumFractionDigits:2,maximumFractionDigits:2});}
function fmtD(d){return new Date(d+'T12:00').toLocaleDateString('en-US',{month:'short',day:'numeric'});}
function groupByDate(arr){const g={};arr.forEach(t=>{if(!g[t.date])g[t.date]=[];g[t.date].push(t);});return g;}

// TOAST
function toast(msg){const t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),2200);}

// MONTHS
function renderMonths(){
  document.getElementById('monthScroll').innerHTML=MONTHS.map(m=>`<button class="month-chip${m===curMonth?' active':''}" onclick="selMonth('${m}')">${ML[m]}</button>`).join('');
}
function selMonth(m){curMonth=m;renderMonths();renderOverview();}

// OVERVIEW
function renderOverview(){
  const d=filtered();
  const inc=d.filter(t=>t.type==='income').reduce((s,t)=>s+t.amount,0);
  const exp=d.filter(t=>t.type==='expense').reduce((s,t)=>s+t.amount,0);
  const net=inc-exp;
  document.getElementById('heroNet').textContent=(net<0?'-':'')+fmt(net);
  document.getElementById('heroNet').style.color=net>=0?'var(--text)':'var(--red)';
  document.getElementById('heroIncome').textContent=fmt(inc);
  document.getElementById('heroExp').textContent=fmt(exp);
  renderDonut(d);
}

function renderDonut(d){
  const ex=d.filter(t=>t.type==='expense');
  const bc={};ex.forEach(t=>{bc[t.catId]=(bc[t.catId]||0)+t.amount;});
  const list=Object.entries(bc).sort((a,b)=>b[1]-a[1]).slice(0,6);
  const tot=list.reduce((s,c)=>s+c[1],0);
  const svg=document.getElementById('donutSvg');
  const cx=80,cy=80,r=62,sw=20,C=2*Math.PI*r;
  if(!list.length){svg.innerHTML=`<text x="80" y="80" fill="var(--sub)" text-anchor="middle" dominant-baseline="middle" font-size="13" font-family="-apple-system,sans-serif">No expenses</text>`;document.getElementById('catList').innerHTML='';return;}
  let off=0,p=`<circle cx="${cx}" cy="${cy}" r="${r}" fill="none" stroke="var(--card2)" stroke-width="${sw}"/>`;
  list.forEach(([id,amt])=>{
    const cat=getCat(id);const dash=(amt/tot)*C;
    p+=`<circle cx="${cx}" cy="${cy}" r="${r}" fill="none" stroke="${cat.color}" stroke-width="${sw}" stroke-dasharray="${dash} ${C-dash}" stroke-dashoffset="${C/4-off}" stroke-linecap="butt"/>`;
    off+=dash;
  });
  p+=`<text x="${cx}" y="${cy-10}" fill="var(--text)" text-anchor="middle" font-size="19" font-weight="700" font-family="-apple-system,sans-serif">${fmt(tot)}</text><text x="${cx}" y="${cy+12}" fill="var(--sub)" text-anchor="middle" font-size="10.5" font-family="-apple-system,sans-serif" font-weight="600" letter-spacing="0.06em">EXPENSES</text>`;
  svg.innerHTML=p;
  document.getElementById('catList').innerHTML=list.map(([id,amt])=>{
    const cat=getCat(id);const pct=Math.round((amt/tot)*100);
    return `<div class="cat-item"><div class="cat-icon-wrap" style="background:${cat.color}22">${iconSvg(cat.icon,cat.color,18)}</div><div class="cat-info"><div class="cat-name">${cat.name}</div><div class="cat-bar-bg"><div class="cat-bar" style="width:${pct}%;background:${cat.color}"></div></div></div><div><div class="cat-amount">${fmt(amt)}</div><div class="cat-pct">${pct}%</div></div></div>`;
  }).join('');
}

// TRANSACTIONS
function renderTx(){
  const q=(document.getElementById('txSearch').value||'').toLowerCase();
  const all=txs.filter(t=>!q||t.merchant.toLowerCase().includes(q)||getCat(t.catId).name.toLowerCase().includes(q)).sort((a,b)=>b.date.localeCompare(a.date));
  const el=document.getElementById('txContainer');
  if(!all.length){el.innerHTML=`<div class="empty"><svg width="36" height="36" viewBox="0 0 24 24" fill="none" stroke="var(--sub)" stroke-width="1.5" stroke-linecap="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg><div class="empty-text">No transactions found</div></div>`;return;}
  const grps=groupByDate(all);
  const today=new Date().toISOString().split('T')[0];
  const yest=new Date(Date.now()-86400000).toISOString().split('T')[0];
  let h='';
  Object.entries(grps).sort((a,b)=>b[0].localeCompare(a[0])).forEach(([date,items])=>{
    let lbl=fmtD(date);if(date===today)lbl='Today';if(date===yest)lbl='Yesterday';
    h+=`<div class="tx-group-label">${lbl}</div><div class="tx-list">`;
    items.forEach(t=>{
      const cat=getCat(t.catId);const isI=t.type==='income';
      h+=`<div class="tx-item"><div class="tx-icon-wrap" style="background:${cat.color}22">${iconSvg(cat.icon,cat.color,17)}</div><div class="tx-info"><div class="tx-name">${t.merchant}</div><div class="tx-cat">${cat.name}</div></div><div class="tx-right"><div class="tx-amt ${isI?'tx-income':'tx-expense'}">${isI?'+':'-'}${fmt(t.amount)}</div><div class="tx-date">${fmtD(t.date)}</div></div></div>`;
    });
    h+=`</div>`;
  });
  el.innerHTML=h;
}

// BUDGETS
const BDGT={hom:1500,gro:300,trn:150,ent:100,shp:200,utl:150,food:200,hlth:100};
function renderBudgets(){
  const d=filtered().filter(t=>t.type==='expense');
  const bc={};d.forEach(t=>{bc[t.catId]=(bc[t.catId]||0)+t.amount;});
  document.getElementById('budgetList').innerHTML=Object.entries(BDGT).map(([id,lim])=>{
    const cat=getCat(id);const spent=bc[id]||0;const pct=Math.min((spent/lim)*100,100);
    const col=pct>=90?'var(--red)':pct>=70?'var(--amber)':'var(--green)';
    return `<div class="budget-item"><div class="budget-top"><div class="budget-left"><div class="budget-icon" style="background:${cat.color}22">${iconSvg(cat.icon,cat.color,17)}</div><div class="budget-name">${cat.name}</div></div><div class="budget-vals"><b style="color:${col}">${fmt(spent)}</b><div>of ${fmt(lim)}</div></div></div><div class="budget-track"><div class="budget-fill" style="width:${pct}%;background:${col}"></div></div></div>`;
  }).join('');
}

// CATEGORY SCREEN
function renderCatScreen(){
  const exp=cats.filter(c=>c.type==='expense');
  const inc=cats.filter(c=>c.type==='income');
  const rows=c=>`<div class="cat-row" onclick="openCatSheet('${c.id}')"><div class="cat-row-icon" style="background:${c.color}22">${iconSvg(c.icon,c.color,17)}</div><div class="cat-row-name">${c.name}</div><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="var(--sub)" stroke-width="2" stroke-linecap="round"><polyline points="9 18 15 12 9 6"/></svg></div>`;
  let h='';
  if(exp.length){h+=`<div class="sec-label">Expense</div><div class="cat-screen-list" style="margin-bottom:18px">${exp.map(rows).join('')}</div>`;}
  if(inc.length){h+=`<div class="sec-label">Income</div><div class="cat-screen-list" style="margin-bottom:18px">${inc.map(rows).join('')}</div>`;}
  document.getElementById('catScreenList').innerHTML=h;
}

// CAT SHEET
let editCatId=null,selColor=PALETTE[0],selIcon='box',cType='expense';

function openCatSheet(id){
  editCatId=id;
  const c=id?cats.find(x=>x.id===id):null;
  document.getElementById('catSheetTitle').textContent=c?'Edit Category':'New Category';
  document.getElementById('cName').value=c?c.name:'';
  selColor=c?c.color:PALETTE[0];selIcon=c?c.icon:'box';cType=c?c.type:'expense';
  setCatType(cType);
  document.getElementById('catDelBtn').style.display=c?'block':'none';
  renderColorGrid();renderIconGrid();
  document.getElementById('catSheetBg').classList.add('open');
}

function setCatType(t){
  cType=t;
  document.getElementById('cBtnExp').className='type-btn'+(t==='expense'?' ae':'');
  document.getElementById('cBtnInc').className='type-btn'+(t==='income'?' ai':'');
}

function renderColorGrid(){
  document.getElementById('colorGrid').innerHTML=PALETTE.map(c=>`<div class="cswatch${c===selColor?' sel':''}" style="background:${c}" onclick="pickColor('${c}')"></div>`).join('');
}
function pickColor(c){selColor=c;renderColorGrid();renderIconGrid();}

function renderIconGrid(){
  document.getElementById('iconGrid').innerHTML=Object.keys(ICONS).map(k=>{
    const active=k===selIcon;
    return `<div class="iswatch" style="background:${active?selColor+'33':'var(--card2)'};border-color:${active?selColor:'transparent'}" onclick="pickIcon('${k}')">${iconSvg(k,active?selColor:'var(--sub)',17)}</div>`;
  }).join('');
}
function pickIcon(k){selIcon=k;renderIconGrid();}

function saveCat(){
  const name=document.getElementById('cName').value.trim();
  if(!name){document.getElementById('cName').focus();return;}
  if(editCatId){const c=cats.find(x=>x.id===editCatId);if(c){c.name=name;c.color=selColor;c.icon=selIcon;c.type=cType;}}
  else{cats.push({id:uid(),name,color:selColor,icon:selIcon,type:cType});}
  saveCatsF();closeCatSheet();renderCatScreen();populateCatSelect();renderOverview();
  toast(editCatId?'Category updated':'Category created');
}

function deleteCat(){
  if(!editCatId)return;
  if(txs.some(t=>t.catId===editCatId)){toast('In use — reassign transactions first');return;}
  cats=cats.filter(c=>c.id!==editCatId);
  saveCatsF();closeCatSheet();renderCatScreen();populateCatSelect();
  toast('Category deleted');
}

function closeCatSheet(){document.getElementById('catSheetBg').classList.remove('open');}
document.getElementById('catSheetBg').addEventListener('click',e=>{if(e.target===e.currentTarget)closeCatSheet();});

// TX SHEET
let curType='expense';
function populateCatSelect(){
  const sel=document.getElementById('fCat');
  sel.innerHTML=cats.filter(c=>c.type===curType).map(c=>`<option value="${c.id}">${c.name}</option>`).join('');
}
function openSheet(){
  document.getElementById('fDate').value=new Date().toISOString().split('T')[0];
  document.getElementById('fAmt').value='';document.getElementById('fMerch').value='';
  setType('expense');populateCatSelect();
  document.getElementById('sheetBg').classList.add('open');
  setTimeout(()=>document.getElementById('fAmt').focus(),300);
}
function closeSheet(){document.getElementById('sheetBg').classList.remove('open');}
document.getElementById('sheetBg').addEventListener('click',e=>{if(e.target===e.currentTarget)closeSheet();});
function setType(t){
  curType=t;
  document.getElementById('btnExpense').className='type-btn'+(t==='expense'?' ae':'');
  document.getElementById('btnIncome').className='type-btn'+(t==='income'?' ai':'');
  populateCatSelect();
}
function saveTransaction(){
  const amt=parseFloat(document.getElementById('fAmt').value);
  const merch=document.getElementById('fMerch').value.trim();
  const catId=document.getElementById('fCat').value;
  const date=document.getElementById('fDate').value;
  if(!merch||!amt||amt<=0||!date){document.getElementById('fAmt').focus();return;}
  txs.unshift({id:Date.now(),type:curType,merchant:merch,catId,amount:amt,date});
  saveTxsF();closeSheet();renderOverview();renderTx();toast('Transaction saved');
}

// TABS
function switchTab(name){
  document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
  document.getElementById('screen-'+name).classList.add('active');
  document.getElementById('tab-'+name).classList.add('active');
  document.querySelectorAll('.tab').forEach(t=>{
    const a=t.classList.contains('active');
    t.querySelector('svg').setAttribute('stroke',a?'var(--accent)':'var(--sub)');
    const fills=t.querySelectorAll('[fill="var(--sub)"]');
    fills.forEach(f=>f.setAttribute('fill',a?'var(--accent)':'var(--sub)'));
  });
  if(name==='transactions')renderTx();
  if(name==='budgets')renderBudgets();
  if(name==='categories')renderCatScreen();
}

// INIT
renderMonths();renderOverview();populateCatSelect();
</script>
